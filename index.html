<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
html,body{
margin:0;
height:100%;
font-family:"Proxima Nova", Arial, sans-serif;
background:url("/month-end-countdown/background.jpg") no-repeat center center fixed;
background-size:contain;
background-color:black;
}

.wrap{
height:100%;
display:flex;
justify-content:center;
align-items:center;
}

.card{
background:rgba(0,0,0,0.6);
padding:28px;
border-radius:22px;
color:white;
text-align:center;
width:85%;
max-width:380px;
backdrop-filter: blur(6px);
}

.title{
letter-spacing:2px;
font-size:14px;
opacity:.85;
}

.time{
font-size:40px;
font-weight:700;
margin:14px 0;
}

.bar{
height:12px;
background:#333;
border-radius:8px;
overflow:hidden;
}

.fill{
height:100%;
width:0%;
background:#FFD200;
transition:width .5s linear;
}

.urgent .fill{ background:#ff3b3b; }
.urgent .time{ color:#ff3b3b; }

.closed{
font-size:32px;
font-weight:700;
color:#FFD200;
}
</style>
</head>

<body>

<div class="wrap">
<div class="card">

<div class="title">MONTH END COUNTDOWN</div>
<div class="time" id="t"></div>

<div class="bar">
<div class="fill" id="f"></div>
</div>

</div>
</div>

<script>
function saNow(){
return new Date(new Date().toLocaleString("en-US",{timeZone:"Africa/Johannesburg"}));
}

// find last Friday of month
function lastFriday(year,month){
let d = new Date(year, month+1, 0); // last day of month
while(d.getDay() !== 5){
d.setDate(d.getDate()-1);
}
d.setHours(17,0,0,0);
return d;
}

function run(){
const now = saNow();
const year = now.getFullYear();
const month = now.getMonth();

const cutoff = lastFriday(year,month);

let nextCutoff = cutoff;

if(now > cutoff){
nextCutoff = lastFriday(year,month+1);
}

const diff = nextCutoff - now;

if(diff <= 0){
document.getElementById("t").innerHTML = "CLOSED";
return;
}

const d=Math.floor(diff/86400000);
const h=Math.floor(diff/3600000)%24;
const m=Math.floor(diff/60000)%60;
const s=Math.floor(diff/1000)%60;

document.getElementById("t").innerHTML =
`${d}d ${h}h ${m}m ${s}s`;

const start = new Date(nextCutoff.getFullYear(), nextCutoff.getMonth(),1);
const pct=((now-start)/(nextCutoff-start))*100;
document.getElementById("f").style.width=pct+"%";

if(d<=3){
document.querySelector(".card").classList.add("urgent");
}
}

setInterval(run,1000);
run();
</script>

</body>
</html>
