<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
html,body{
margin:0;
height:100%;
font-family:Arial, sans-serif;
overflow:hidden;
background:url("background-tv.jpg") no-repeat center center fixed;
background-size:cover;
}

/* Smoky overlay */
.overlay{
position:fixed;
inset:0;
background:rgba(15,15,15,0.45);
}

.wrap{
height:100%;
display:flex;
justify-content:center;
align-items:center;
}

.card{
background:rgba(0,0,0,0.45);
padding:28px;
border-radius:22px;
color:white;
text-align:center;
width:85%;
max-width:380px;
backdrop-filter: blur(8px);
transition:all .3s ease;
}

.title{
font-size:14px;
opacity:.85;
letter-spacing:2px;
}

.sub{
font-size:12px;
opacity:.75;
margin-bottom:10px;
}

.time{
font-size:44px;
font-weight:800;
margin:14px 0;
transition:all .2s ease;
}

.bar{
height:12px;
background:#333;
border-radius:8px;
overflow:hidden;
}

.fill{
height:100%;
width:0%;
background:#FFD200;
transition:width .6s linear;
box-shadow:0 0 12px #FFD200;
}

/* TV scaling */
@media (min-width:900px){
.card{max-width:720px;padding:60px;}
.time{font-size:100px;}
.title{font-size:28px;}
.sub{font-size:20px;}
.bar{height:18px;}
}

.amber{color:#FFB000;}
.red{color:#ff3b3b;}
.pulse{animation:pulse 1s infinite;}

@keyframes pulse{
0%{transform:scale(1);}
50%{transform:scale(1.06);}
100%{transform:scale(1);}
}

.closedScreen{
position:fixed;
inset:0;
background:black;
display:flex;
justify-content:center;
align-items:center;
flex-direction:column;
font-size:64px;
font-weight:900;
color:#FFD200;
letter-spacing:4px;
text-align:center;
}
</style>
</head>

<body>

<div class="overlay"></div>

<div class="wrap">
<div class="card">

<div class="title" id="title">OWN THE MONTH</div>
<div class="sub" id="sub">Start strong. Control the pace.</div>

<div class="time" id="t"></div>

<div class="bar">
<div class="fill" id="f"></div>
</div>

</div>
</div>

<script>
function saNow(){
return new Date(new Date().toLocaleString("en-US",{timeZone:"Africa/Johannesburg"}));
}

function lastBusinessDay(year, month){
let d = new Date(year, month+1, 0);
if(d.getDay()===6)d.setDate(d.getDate()-1);
if(d.getDay()===0)d.setDate(d.getDate()-2);
d.setHours(17,0,0,0);
return d;
}

function run(){

const now = saNow();
let year = now.getFullYear();
let month = now.getMonth();

let cutoff = lastBusinessDay(year, month);

if(now > cutoff){
month++;
if(month>11){month=0;year++;}
cutoff = lastBusinessDay(year, month);
}

const diff = cutoff - now;

if(diff<=0){
document.body.innerHTML=
'<div class="closedScreen">SALES CLOSED<div style="font-size:22px;font-weight:400;margin-top:10px;">Strong finish.</div></div>';
return;
}

const d=Math.floor(diff/86400000);
const h=Math.floor(diff/3600000)%24;
const m=Math.floor(diff/60000)%60;
const s=Math.floor(diff/1000)%60;

const timer=document.getElementById("t");
const fill=document.getElementById("f");
const title=document.getElementById("title");
const sub=document.getElementById("sub");

timer.classList.remove("amber","red","pulse");
fill.style.background="#FFD200";
timer.style.fontSize="";

const start=new Date(cutoff.getFullYear(), cutoff.getMonth(),1);
const pct=((now-start)/(cutoff-start))*100;
fill.style.width=pct+"%";

/* NORMAL MONTH PHASES */
if(d >= 15){
title.innerHTML="OWN THE MONTH";
sub.innerHTML="Start strong. Control the pace.";
timer.innerHTML=`${d}d ${h}h ${m}m ${s}s`;
}
else if(d >= 8){
title.innerHTML="MAINTAIN PRESSURE";
sub.innerHTML="Consistency builds numbers.";
timer.innerHTML=`${d}d ${h}h ${m}m ${s}s`;
}
else if(d >= 4){
title.innerHTML="HIT THE PHONES";
sub.innerHTML="Conversations create revenue.";
timer.innerHTML=`${d}d ${h}h ${m}m ${s}s`;
timer.classList.add("amber");
fill.style.background="#FFB000";
}
else if(d >= 1){
title.innerHTML="LOCK IT IN";
sub.innerHTML="No opportunities left behind.";
timer.innerHTML=`${d}d ${h}h ${m}m ${s}s`;
timer.classList.add("amber");
fill.style.background="#FFB000";
}

/* FINAL BUSINESS DAY */
if(d === 0){

timer.innerHTML=`${h}h ${m}m ${s}s`;
timer.classList.add("amber");
fill.style.background="#FFB000";

if(now.getHours() < 14){
title.innerHTML="CLOSE DAY";
sub.innerHTML="Execute with focus.";
}

if(now.getHours() >= 14){
title.innerHTML="FINAL HOURS";
sub.innerHTML="Lock in every opportunity.";
timer.classList.remove("amber");
timer.classList.add("red","pulse");
fill.style.background="#ff3b3b";
}

if(now.getHours() >= 16){
sub.innerHTML="Last hour approaching.";
}

if(now.getHours() === 16 && now.getMinutes() >= 55){
sub.innerHTML="Final minutes.";
timer.style.fontSize="120px";
}
}
}

setInterval(run,1000);
run();
</script>

</body>
</html>
