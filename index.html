<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
html,body{
margin:0;
height:100%;
font-family:"Proxima Nova", Arial, sans-serif;
background:url("/month-end-countdown/background.jpg") no-repeat center center fixed;
background-size:contain;
background-color:black;
overflow:hidden;
}

.wrap{
height:100%;
display:flex;
justify-content:center;
align-items:center;
}

.card{
background:rgba(0,0,0,0.65);
padding:28px;
border-radius:22px;
color:white;
text-align:center;
width:85%;
max-width:380px;
backdrop-filter: blur(8px);
transition:.3s;
}

.title{
letter-spacing:2px;
font-size:14px;
opacity:.85;
margin-bottom:6px;
}

.sub{
font-size:12px;
opacity:.7;
margin-bottom:10px;
}

.time{
font-size:44px;
font-weight:800;
margin:14px 0;
transition:.2s;
}

.bar{
height:12px;
background:#333;
border-radius:8px;
overflow:hidden;
}

.fill{
height:100%;
width:0%;
background:#FFD200;
transition:width .6s linear;
box-shadow:0 0 12px #FFD200;
}

.urgent .fill{
background:#ff3b3b;
box-shadow:0 0 20px #ff3b3b;
}

.urgent .time{
color:#ff3b3b;
}

.pulse{
animation:pulse 1s infinite;
}

@keyframes pulse{
0%{transform:scale(1);}
50%{transform:scale(1.06);}
100%{transform:scale(1);}
}

.closedScreen{
position:fixed;
inset:0;
background:black;
display:flex;
justify-content:center;
align-items:center;
font-size:48px;
font-weight:900;
color:#FFD200;
z-index:999;
letter-spacing:3px;
}
</style>
</head>

<body>

<div class="wrap">
<div class="card" id="card">

<div class="title" id="title">BUILD MOMENTUM</div>
<div class="sub" id="sub">Closes Friday 17:00 (SA)</div>

<div class="time" id="t"></div>

<div class="bar">
<div class="fill" id="f"></div>
</div>

</div>
</div>

<script>
function saNow(){
return new Date(new Date().toLocaleString("en-US",{timeZone:"Africa/Johannesburg"}));
}

function lastFriday(year,month){
let d = new Date(year, month+1, 0);
while(d.getDay() !== 5){
d.setDate(d.getDate()-1);
}
d.setHours(17,0,0,0);
return d;
}

function run(){

const now = saNow();
const year = now.getFullYear();
const month = now.getMonth();

let cutoff = lastFriday(year,month);
if(now > cutoff){
cutoff = lastFriday(year,month+1);
}

const diff = cutoff - now;

if(diff <= 0){
document.body.innerHTML =
'<div class="closedScreen">SALES CLOSED</div>';
return;
}

const d=Math.floor(diff/86400000);
const h=Math.floor(diff/3600000)%24;
const m=Math.floor(diff/60000)%60;
const s=Math.floor(diff/1000)%60;

document.getElementById("t").innerHTML =
`${d}d ${h}h ${m}m ${s}s`;

const start=new Date(cutoff.getFullYear(),cutoff.getMonth(),1);
const pct=((now-start)/(cutoff-start))*100;
document.getElementById("f").style.width=pct+"%";

let title=document.getElementById("title");
let sub=document.getElementById("sub");
let card=document.getElementById("card");

// Dynamic performance messaging
if(d >= 15){
title.innerHTML="BUILD MOMENTUM";
sub.innerHTML="Set the pace. Own the month.";
}
else if(d >= 8){
title.innerHTML="STAY ON TARGET";
sub.innerHTML="Consistency wins. Keep pushing.";
}
else if(d >= 4){
title.innerHTML="PUSH THE CALLS";
sub.innerHTML="Tighten deals. Increase pressure.";
}
else if(d >= 1){
title.innerHTML="FINAL STRETCH";
sub.innerHTML="Every deal matters now.";
card.classList.add("urgent");
}
else{
title.innerHTML="LAST HOURS";
sub.innerHTML="Close everything possible.";
card.classList.add("urgent");
document.getElementById("t").classList.add("pulse");
}
}

setInterval(run,1000);
run();
</script>

</body>
</html>
