<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
html,body{
margin:0;
height:100%;
font-family:Arial, sans-serif;
background:black;
overflow:hidden;
}

/* BACKGROUND IMAGE */
.bg{
position:fixed;
inset:0;
width:100%;
height:100%;
object-fit:cover;
z-index:-2;
}

/* DARK OVERLAY */
.overlay{
position:fixed;
inset:0;
background:rgba(15,15,15,0.45);
z-index:-1;
}

.wrap{
height:100%;
display:flex;
justify-content:center;
align-items:center;
}

.card{
background:rgba(0,0,0,0.45);
padding:28px;
border-radius:22px;
color:white;
text-align:center;
width:85%;
max-width:380px;
backdrop-filter: blur(8px);
}

.title{font-size:14px;opacity:.85;}
.sub{font-size:12px;opacity:.7;margin-bottom:10px;}
.time{font-size:44px;font-weight:800;margin:14px 0;}

.bar{
height:12px;
background:#333;
border-radius:8px;
overflow:hidden;
}

.fill{
height:100%;
width:0%;
background:#FFD200;
transition:width .6s linear;
}

/* TV SIZE */
@media (min-width:900px){
.card{max-width:720px;padding:60px;}
.time{font-size:100px;}
.title{font-size:28px;}
.sub{font-size:20px;}
.bar{height:18px;}
}

.amber{color:#FFB000;}
.red{color:#ff3b3b;}
.pulse{animation:pulse 1s infinite;}

@keyframes pulse{
0%{transform:scale(1);}
50%{transform:scale(1.05);}
100%{transform:scale(1);}
}

.closedScreen{
position:fixed;
inset:0;
background:black;
display:flex;
justify-content:center;
align-items:center;
font-size:64px;
font-weight:900;
color:#FFD200;
}
</style>
</head>

<body>

<!-- BACKGROUND IMAGE -->
<img src="background-tv.jpg" class="bg">

<div class="overlay"></div>

<div class="wrap">
<div class="card">

<div class="title" id="title">BUILD MOMENTUM</div>
<div class="sub" id="sub">Closes 17:00 (SA)</div>

<div class="time" id="t"></div>

<div class="bar">
<div class="fill" id="f"></div>
</div>

</div>
</div>

<script>
function saNow(){
return new Date(new Date().toLocaleString("en-US",{timeZone:"Africa/Johannesburg"}));
}

function lastBusinessDay(year, month){
let d = new Date(year, month+1, 0);
if(d.getDay()===6)d.setDate(d.getDate()-1);
if(d.getDay()===0)d.setDate(d.getDate()-2);
d.setHours(17,0,0,0);
return d;
}

function run(){

const now = saNow();
let year = now.getFullYear();
let month = now.getMonth();

let cutoff = lastBusinessDay(year, month);

if(now > cutoff){
month++;
if(month>11){month=0;year++;}
cutoff = lastBusinessDay(year, month);
}

const diff = cutoff - now;

if(diff<=0){
document.body.innerHTML='<div class="closedScreen">SALES CLOSED</div>';
return;
}

const d=Math.floor(diff/86400000);
const h=Math.floor(diff/3600000)%24;
const m=Math.floor(diff/60000)%60;
const s=Math.floor(diff/1000)%60;

const timer=document.getElementById("t");
const fill=document.getElementById("f");

timer.innerHTML=`${d}d ${h}h ${m}m ${s}s`;

const start=new Date(cutoff.getFullYear(), cutoff.getMonth(),1);
const pct=((now-start)/(cutoff-start))*100;
fill.style.width=pct+"%";

timer.classList.remove("amber","red","pulse");
fill.style.background="#FFD200";

if(d<=4 && d>0){
timer.classList.add("amber");
fill.style.background="#FFB000";
}

if(d===0){
if(now.getHours()>=14){
timer.classList.add("red","pulse");
fill.style.background="#ff3b3b";
}else{
timer.classList.add("amber");
fill.style.background="#FFB000";
}
}
}

setInterval(run,1000);
run();
</script>

</body>
</html>
